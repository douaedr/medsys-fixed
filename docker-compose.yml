version: "3.9"

# ─────────────────────────────────────────────────────────────
#  MedSys – Docker Compose complet
#  Ordre de démarrage : rabbitmq + DBs → microservices → gateway
# ─────────────────────────────────────────────────────────────

services:

  # ── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: medsys-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsys-net

  # ── Bases de données MySQL ─────────────────────────────────
  mysql-auth:
    image: mysql:8.0
    container_name: medsys-mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_auth_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsys-net

  mysql-patient:
    image: mysql:8.0
    container_name: medsys-mysql-patient
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_patient_db
    ports:
      - "3309:3306"
    volumes:
      - mysql_patient_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsys-net

  mysql-rdv:
    image: mysql:8.0
    container_name: medsys-mysql-rdv
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_rdv_db
    ports:
      - "3310:3306"
    volumes:
      - mysql_rdv_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsys-net

  # ── MongoDB (ms-personnel .NET) ───────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: medsys-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medsys-net

  # ── ms-auth (Spring Boot – port 8082) ─────────────────────
  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: medsys-ms-auth
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_AUTH_URL: jdbc:mysql://mysql-auth:3306/ms_auth_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
      DB_USERNAME: root
      DB_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_SECRET: medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      MS_PATIENT_URL: http://ms-patient-personnel:8081
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      mysql-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medsys-net

  # ── ms-patient-personnel (Spring Boot – port 8081) ────────
  ms-patient-personnel:
    build:
      context: ./ms-patient-personnel
      dockerfile: Dockerfile
    container_name: medsys-ms-patient
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PATIENT_URL: jdbc:mysql://mysql-patient:3306/ms_patient_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
      DB_USERNAME: root
      DB_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_SECRET: medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits
      JWT_EXPIRATION: 86400000
      MS_AUTH_URL: http://ms-auth:8082
      MS_RDV_URL: http://ms-rdv:8083
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      mysql-patient:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medsys-net

  # ── ms-rdv (Spring Boot – port 8083) ──────────────────────
  ms-rdv:
    build:
      context: ./ms-rdv
      dockerfile: Dockerfile
    container_name: medsys-ms-rdv
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-rdv:3306/ms_rdv_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits
      APP_MS_PATIENT_URL: http://ms-patient-personnel:8081
      APP_MS_AUTH_URL: http://ms-auth:8082
    depends_on:
      mysql-rdv:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medsys-net

  # ── ms-notify (Spring Boot – port 8084) ───────────────────
  ms-notify:
    build:
      context: ./ms-notify
      dockerfile: Dockerfile
    container_name: medsys-ms-notify
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MAIL_USERNAME: ${MAIL_USERNAME:-medsys.hopital@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      MS_RDV_URL: http://ms-rdv:8083
      MS_AUTH_URL: http://ms-auth:8082
      FRONTEND_URL: http://localhost:5173
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medsys-net

  # ── api-gateway (Spring Cloud Gateway – port 8080) ────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: medsys-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MS_AUTH_URL: http://ms-auth:8082
      MS_PATIENT_URL: http://ms-patient-personnel:8081
      MS_RDV_URL: http://ms-rdv:8083
      MS_NOTIFY_URL: http://ms-notify:8084
      MS_PERSONNEL_URL: http://ms-personnel:8080
      JWT_SECRET: medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits
    depends_on:
      - ms-auth
      - ms-patient-personnel
      - ms-rdv
      - ms-notify
    restart: unless-stopped
    networks:
      - medsys-net

  # ── ms-personnel (.NET – port 5130) ───────────────────────
  ms-personnel:
    build:
      context: "./ms-personnel/PersonnelMS - Backend_API_et_MongoDB/PersonnelMS - Copy (2)"
      dockerfile: PersonnelMS/Dockerfile
    container_name: medsys-ms-personnel
    ports:
      - "5130:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: PersonnelMS
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medsys-net

# ── Volumes persistants ────────────────────────────────────
volumes:
  rabbitmq_data:
  mysql_auth_data:
  mysql_patient_data:
  mysql_rdv_data:
  mongodb_data:

# ── Réseau interne ─────────────────────────────────────────
networks:
  medsys-net:
    driver: bridge
