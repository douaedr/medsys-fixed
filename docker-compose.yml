version: '3.9'

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: medsys-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Message Broker ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: medsys-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # Console de gestion : http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── MS Auth (8082) ───────────────────────────────────────────────────────────
  ms-auth:
    build: ./ms-auth
    container_name: medsys-auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      DB_AUTH_URL: jdbc:mysql://mysql:3306/ms_auth_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${MAIL_USERNAME:-medsys.hopital@gmail.com}
      SMTP_PASSWORD: ${MAIL_PASSWORD:-changeme}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

  # ── MS Patient-Personnel (8081) ──────────────────────────────────────────────
  ms-patient-personnel:
    build: ./ms-patient-personnel
    container_name: medsys-patient
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads
    environment:
      DB_PATIENT_URL: jdbc:mysql://mysql:3306/ms_patient_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MS_AUTH_URL: http://ms-auth:8082
      MS_RDV_URL: http://ms-rdv:8083
      UPLOAD_DIR: uploads/patients
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

  # ── MS RDV (8083) ────────────────────────────────────────────────────────────
  ms-rdv:
    build: ./ms-rdv
    container_name: medsys-rdv
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      DB_RDV_URL: jdbc:mysql://mysql:3306/ms_rdv_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}

  # ── MS Notify (8084) ─────────────────────────────────────────────────────────
  ms-notify:
    build: ./ms-notify
    container_name: medsys-notify
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MAIL_USERNAME: ${MAIL_USERNAME:-medsys.hopital@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

  # ── API Gateway (8080) ───────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: medsys-gateway
    restart: unless-stopped
    depends_on:
      - ms-auth
      - ms-patient-personnel
      - ms-rdv
      - ms-notify
    ports:
      - "8080:8080"
    environment:
      MS_AUTH_URL: http://ms-auth:8082
      MS_PATIENT_URL: http://ms-patient-personnel:8081
      MS_RDV_URL: http://ms-rdv:8083
      MS_NOTIFY_URL: http://ms-notify:8084
      JWT_SECRET: ${JWT_SECRET:-medsys-hospital-jwt-secret-key-2026-very-long-and-secure-production-key-minimum-256-bits}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

volumes:
  mysql_data:
  uploads_data:
