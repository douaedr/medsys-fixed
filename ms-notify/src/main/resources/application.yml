server:
  port: 8084

spring:
  application:
    name: ms-notify

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:medsys.hopital@gmail.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

app:
  ms-rdv-url: ${MS_RDV_URL:http://localhost:8083}
  ms-auth-url: ${MS_AUTH_URL:http://localhost:8082}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    ma.medsys.notify: DEBUG
    org.springframework.messaging: INFO
    org.springframework.web.socket: INFO
