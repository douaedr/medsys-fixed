server:
  port: 8081

spring:
  application:
    name: ms-patient-personnel

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    url: jdbc:mysql://localhost:3307/ms_patient_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Africa/Casablanca
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true


  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Africa/Casablanca
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hospital.patient: DEBUG
    org.springframework.web: INFO



jwt:
  secret: medsys-hospital-jwt-secret-key-2026-very-long-and-secure-string
  expiration: 86400000

app:
  upload:
    dir: uploads/patients
