# ── Test datasource: H2 in-memory (MySQL non requis) ─────────────────────────
spring.datasource.url=jdbc:h2:mem:ms_patient_test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── RabbitMQ: ne pas démarrer les listeners au boot (pas de broker en CI) ─────
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

# ── JWT (valeur de test) ──────────────────────────────────────────────────────
jwt.secret=medsys-hospital-jwt-secret-key-2026-very-long-and-secure-string-please-change-in-prod
jwt.expiration=900000

# ── Upload dir ────────────────────────────────────────────────────────────────
app.upload.dir=/tmp/medsys-test-uploads
